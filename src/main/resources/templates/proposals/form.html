<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Nova prijava</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}" th:text="${appName}">Freelancer Platforma</a>
    <nav class="nav">
        <a th:href="@{/jobs}">Poslovi</a>
        <a th:href="@{/dashboard}">Panel</a>
        <form method="post" th:action="@{/logout}">
            <button class="nav-button" type="submit">Odjava</button>
        </form>
    </nav>
</header>

<main class="page-shell narrow">
    <div class="page-header">
        <div>
            <p class="eyebrow" th:text="${job.title}">Posao</p>
            <h1>Nova prijava</h1>
        </div>
        <a class="button secondary" th:href="@{/jobs/{id}(id=${job.id})}">Nazad</a>
    </div>

    <div th:if="${errorMessage}" class="alert" th:text="${errorMessage}">Greska</div>
    <div th:if="${successMessage}" class="notice" th:text="${successMessage}">Poruka</div>

    <form class="form-panel"
          method="post"
          enctype="multipart/form-data"
          th:object="${proposalForm}"
          th:action="@{/jobs/{id}/proposals(id=${job.id})}">
        <input type="hidden" th:field="*{freelancerId}">

        <label>
            Tekst prijave
            <textarea th:field="*{proposalText}" rows="8" placeholder="Predstavi iskustvo, pristup poslu i razlog zasto si dobar izbor"></textarea>
        </label>
        <div class="ai-actions">
            <button class="button secondary"
                    type="submit"
                    th:formaction="@{/jobs/{id}/proposals/draft(id=${job.id})}"
                    formnovalidate>Generisi predlog</button>
        </div>

        <div class="form-grid">
            <label>
                Ponudjena cena
                <input type="number" min="0" step="0.01" th:field="*{offeredPrice}">
            </label>

            <label>
                Rok izrade u danima
                <input type="number" min="1" th:field="*{estimatedDays}">
            </label>
        </div>

        <label>
            CV fajl
            <input type="file" name="cvFile" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </label>

        <div class="form-actions">
            <button class="button primary" type="submit">Posalji prijavu</button>
            <a class="button secondary" th:href="@{/jobs/{id}(id=${job.id})}">Odustani</a>
        </div>
    </form>
</main>
</body>
</html>
