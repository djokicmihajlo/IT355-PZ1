<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Prijava</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}" th:text="${appName}">Freelancer Platforma</a>
    <nav class="nav">
        <a th:href="@{/jobs}">Poslovi</a>
        <a th:href="@{/register}">Registracija</a>
    </nav>
</header>

<main class="page-shell narrow">
    <div class="page-header">
        <div>
            <p class="eyebrow">Dobrodosao nazad</p>
            <h1>Prijava</h1>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert" th:text="${errorMessage}">Greska</div>

    <form class="form-panel" method="post" th:object="${loginForm}" th:action="@{/login}">
        <label>
            Korisnicko ime
            <input type="text" th:field="*{username}" placeholder="npr. client_milan">
        </label>

        <label>
            Lozinka
            <input type="password" th:field="*{password}" placeholder="Lozinka">
        </label>

        <div class="form-actions">
            <button class="button primary" type="submit">Prijavi se</button>
            <a class="button secondary" th:href="@{/register}">Napravi nalog</a>
        </div>
    </form>

    <section class="helper-panel">
        <h2>Demo nalozi</h2>
        <p th:each="account : ${demoAccounts}" th:text="${account}">demo / lozinka</p>
    </section>
</main>
</body>
</html>
